<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bento-grid.css">
</head>
    <body>
        <div class="card">
            <div class="first-card">
                    <p class="title-first-card">
                        Create and schedule content
                        <span class="title-first-card">
                            <i>quicker</i>
                        </span>
                    </p>
                    <div class="img-create-post-cont">
                        <img class="img-create-post" src="bento-grid-main\bento-grid-main\assets\images\illustration-create-post.webp"
                        alt="">
                    </div>
            </div>
                
            <div class="second-card">
                    <p class="title-second-card">
                        Social Media 
                    <span class="title-second-card">10x</span>
                        Faster with AI
                    </p>
                    <div class="rating">
                        <img class="img-stars" src="bento-grid-main\bento-grid-main\assets\images\illustration-five-stars.webp"
                        alt="">
                        <p class="reviews">Over 4,000 5-star reviews</p>
                    </div>
            </div>
            
            <div class="third-card">
                    <p class="title-third-card">
                        Schedule to social media.
                    </p>
                    <div class="img-schedule-sosmed">
                        <img class="img-time-post" src="bento-grid-main\bento-grid-main\assets\images\illustration-schedule-posts.webp"
                        alt="">
                    </div>
                    <div class="description-optimize">
                        <p class="description">
                            Optimize post timings to publish content 
                            at thee perfect time for your audience
                        </p>
                    </div>
            </div>
        </div>
    <body>
</html>
