<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,500..800;1,500..800&display=swap');

        *{
            padding: 0;
            margin: 0;
        }
        
        body {
            font-family: "Figtree", Arial, Helvetica, sans-serif;
            font-size: 16px;
            line-height: 1.5em;
            background-color: hsl(47, 88%, 63%);
        }

        .container{
            max-width: 1440px;
            margin: 50px auto;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        .card {
            max-width: 290px;
            border: 1px solid hsl(0, 0%, 7%);
            border-radius: 16px;
            padding: 20px;
            overflow: hidden;
            background-color: white;
            box-shadow: 4px 4px 5px rgba(0, 0, 0, 0.5); 
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .card:hover {
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.9); /* Shadow saat hover */
            transform: translateY(-5px); /* Memberikan efek melayang */
        }

        .card .header img {
            width: 290px;
            border-radius: 10px;
        }

        .content {
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .content button {
            background-color: hsl(47, 88%, 63%);
            font-weight: 800;
            padding: 6px 10px;
            border-radius: 2px;
            border: none;
        }

        .content h4 {
            font-size: 15px;
            font-weight: 400;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .content h3 {
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: 800;
            transition: color 0.3s ease;
            cursor: pointer;
        }
        .content h3:hover{
            color: hsl(47, 88%, 63%);
        }

        .content p {
            font-size: 15px;
            color: hsl(0, 0%, 42%);
        }

        .profile {
            display: flex;
            align-items: center;
        }

        .profile img {
            width: 28px;
            margin-right: 10px;
        }

        .profile p {
            font-size: 13px;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <header class="header">
                <img src="assets\images\illustration-article.svg" alt="">
            </header>
            <div class="content">
                <button>Learning</button>
                <h4>Published 21 Dec 2023</h4>
                <h3>HTML & CSS foundations</h3>
                <p>These language are the backbone of every website, difining structure, content, and presentation.</p>
            </div>
            <div class="profile">
                <img src="assets\images\image-avatar.webp" alt="">
                <p>Greg Hooper</p>
            </div>
        </div>
    </div>
</body>
</html>
