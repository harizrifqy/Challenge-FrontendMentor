<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>

    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-auto-rows: 300px;
            column-gap: 20px;
        }

        .nested-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%; /* Isi penuh tinggi baris grid utama */
            row-gap: 20px;
            column-gap: 20px;
        }
    </style>
</head>
    <body>
        <div class="container"> 
            <div style="
                background-color: lightblue;
                height: 280px;
                border-radius: 10px;
                ">div 1
            </div>
            <div style="
                background-color: lightpink;
                height: 210px;
                border-radius: 10px;
                ">div 2
            </div>
            <div style="
                background-color: lightblue;
                height: 400px;
                border-radius: 10px;
                ">div 3
            </div>
            <div style="
                background-color: lightpink;
                height: 280px;
                border-radius: 10px;
                ">div 4
            </div>

            <div class="nested-grid">
                <div class="box" style="
                        background-color: lightblue;
                        height: 110px;
                        border-radius: 10px;
                        ">div 5
                </div>
                <div class="box" style="
                    background-color: lightpink;
                    height: 110px;
                    border-radius: 10px;
                    ">div 6
                </div>
                
                <div class="box" style="
                    background-color: lightblue;
                    height: 130px;
                    border-radius: 10px;
                    ">div 7
                </div>
                <div class="box" style="
                    background-color: lightpink;
                    height: 130px;
                    border-radius: 10px;
                    ">div 8
                </div>
            </div>
            </div>
        </div>
    </body>
</html>
