<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400,600,700;1,14..32,400,600,700&display=swap');

        :root {
            --btn-hover:  hsl(75, 94%, 57%);
            --card-and-btn: hsl(0, 0%, 20%);
            --bg: hsl(0, 0%, 8%);
        }
        * {
            padding: 0;
            margin: 0;
        }
        .body{
            max-width: 1440px;
            font-family: 'Inter', Arial, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="content">
                <img src="assets\images\avatar-jessica.jpeg" alt="">
                <h3 class="name">Jessica Randall</h3>
                <p class="from">London, United Kingdom</p>
                <p>"Front-end developer and avid reader."</p>
            </div>
            <div class="btn">
                <button class="github-btn">GitHub</button>
                <button class="fm-btn">Frontend Mentor</button>
                <button class="linkedin-btn">LinkedIn</button>
                <button class="twitter btn">Twitter</button>
                <button class="instagram-btn">Instagram</button>
            </div>
        </div>
    </div>
</body>
</html>
